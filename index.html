<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Untuk Icaku Sayang - a sweet rose greeting for my beloved.">
    <title>Untuk Icaku Sayang</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer>
        window.addEventListener('DOMContentLoaded', function () {
            document.body.classList.add('ready');
        });
    </script>
</head>

<body>
    <div class="container">
        <div class="letter">
            <h1>Untuk Icaku Sayang</h1>
            <p>Your smile is as beautiful as a rose, I hope you can always smile. (✿◡‿◡)</p>

        </div>
        <div class="rose">
            <!-- HEAD: move .rose-head to reposition petal cluster -->
            <div class="rose-head">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
            </div>
            <!-- STEM + LEAVES: move .leaf to reposition the stem group -->
            <div class="leaf">
                <div class="stem"></div>
                <div class="leafs"></div>
                <div class="leafs"></div>
            </div>
        </div>
    </div>
</body>

</html>
